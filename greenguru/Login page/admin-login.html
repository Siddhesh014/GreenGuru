<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GreenGuru</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #1e1e1e; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #2a2a2a; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; }
        .login-box img { max-width: 150px; margin-bottom: 20px; }
        .login-box h2 { margin-bottom: 20px; color: #4caf50; font-weight: 800; letter-spacing: -0.5px; }
        .login-box p { color: #aaa; font-size: 14px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #bbb; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 6px; background: #333; color: #fff; box-sizing: border-box; font-family: inherit; font-size: 15px; transition: border-color 0.3s; }
        .input-group input:focus { outline: none; border-color: #4caf50; }
        .btn { width: 100%; padding: 14px; background: #4caf50; border: none; border-radius: 6px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { background: #45a049; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3); }
        .back-link { display: block; margin-top: 25px; color: #888; text-decoration: none; font-size: 14px; transition: color 0.3s; }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Portal</h2>
        <p>Restricted area. Secure login required.</p>
        <form action="admin-login.php" method="POST">
            <div class="input-group">
                <label for="username">Administrator ID</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="input-group">
                <label for="password">Access Phrase</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn">Secure Login</button>
        </form>
        <a href="login.html" class="back-link">&larr; Return to Customer Login</a>
    </div>
</body>
</html>
